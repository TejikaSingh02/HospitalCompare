services:
  # 1. Spring Boot Backend Web Service
  - type: web
    name: hospital-compare-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    envVars:
      - key: PORT
        value: 8080

  # 2. React Vite Frontend Static Site
  - type: web
    name: hospital-compare-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
